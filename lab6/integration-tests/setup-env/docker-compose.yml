version: '3.8'

services:
  mongo-database:
    build:
      context: ../../mongo
      dockerfile: Dockerfile
    image: mongo_database
    container_name: mongo-database
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE}
    networks:
      - property_service_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13.7-management-alpine
    ports:
      - "15672:15672"
      - "5672:5672"
    environment:
      RABBITMQ_DEFAULT_USER: testuser
      RABBITMQ_DEFAULT_PASS: testuser
    networks:
      - property_service_network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.43.1
    ports:
      - "7700:7700"
    environment:
      MEILI_MASTER_KEY: MASTER_KEY
    networks:
      - property_service_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 5s
      timeout: 5s
      retries: 5

  api_gateway:
    build:
      context: ../../api_gateway
      dockerfile: Dockerfile.dev
    image: api_gateway:development
    container_name: api-gateway
    restart: always
    ports:
      - "8080:8080"
    environment:
      - ACCESS_SECRET=${ACCESS_SECRET}
      - REFRESH_SECRET=${REFRESH_SECRET}
      - DB_CONNECTION=mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@mongo-database:27017/${MONGO_DATABASE}?authSource=admin
      - USERVER_RPS_CCONTROL_ENABLED=false
    depends_on:
      mongo-database:
        condition: service_healthy
    networks:
      - property_service_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  property-indexer:
    build:
      context: ../../document-indexer
      dockerfile: Dockerfile
    image: document-indexer:development
    volumes:
      - ./property-indexer-config:/app/config:ro
    environment:
      MEILISEARCH_URL: http://meilisearch:7700
      MEILISEARCH_API_KEY: MASTER_KEY
      RMQ_CONNECTION_URL: amqp://testuser:testuser@rabbitmq:5672
    depends_on:
      meilisearch:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - property_service_network

  user-indexer:
    build:
      context: ../../document-indexer
      dockerfile: Dockerfile
    image: document-indexer:development
    volumes:
      - ./user-indexer-config:/app/config:ro
    environment:
      MEILISEARCH_URL: http://meilisearch:7700
      MEILISEARCH_API_KEY: MASTER_KEY
      RMQ_CONNECTION_URL: amqp://testuser:testuser@rabbitmq:5672
    depends_on:
      meilisearch:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - property_service_network

  property-searcher:
    build:
      context: ../../document-searcher
      dockerfile: Dockerfile
    image: document-searcher:development
    ports:
      - "8080:8080"
    environment:
      MEILISEARCH_URL: http://meilisearch:7700
      MEILISEARCH_API_KEY: MASTER_KEY
      RMQ_CONNECTION_URL: amqp://testuser:testuser@rabbitmq:5672
      POOL_NAME: properties
      PORT: "8080"
      INDEX_NAME: properties-index
    depends_on:
      meilisearch:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - property_service_network

  user-searcher:
    build:
      context: ../../document-searcher
      dockerfile: Dockerfile
    image: document-searcher:development
    ports:
      - "8080:8080"
    environment:
      MEILISEARCH_URL: http://meilisearch:7700
      MEILISEARCH_API_KEY: MASTER_KEY
      RMQ_CONNECTION_URL: amqp://testuser:testuser@rabbitmq:5672
      POOL_NAME: users
      PORT: "8080"
      INDEX_NAME: users-index
    depends_on:
      meilisearch:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - property_service_network

networks:
  property_service_network:
    driver: bridge
