components:
  schemas:
    TokenPair:
      type: object
      additionalProperties: false
      properties:
        accessToken:
          type: string
          minLength: 1
        refreshToken:
          type: string
          minLength: 1
      required:
      - accessToken
      - refreshToken

    RegisterRequestBody:
      type: object
      additionalProperties: false
      properties:
        login:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 1
        firstName:
          type: string
          minLength: 1
        lastName:
          type: string
          minLength: 1
      required:
      - login
      - password
      - firstName
      - lastName

    LoginRequestBody:
      type: object
      additionalProperties: false
      properties:
        login:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 1
      required:
      - login
      - password

    RefreshTokenRequestBody:
      type: object
      additionalProperties: false
      properties:
        accessToken:
          type: string
          minLength: 1
      required:
      - accessToken
