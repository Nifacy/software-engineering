components:
  schemas:
    UserInfo:
      type: object
      additionalProperties: false
      properties:
        id:
          type: string
          minLength: 1
        login:
          type: string
          minLength: 1
        firstName:
          type: string
          minLength: 1
        lastName:
          type: string
          minLength: 1
      required:
      - id
      - login
      - firstName
      - lastName

    UserIds:
      type: object
      additionalProperties: false
      properties:
        userIds:
          type: array
          items:
            type: string
            minLength: 1
      required:
      - userIds

    UserViewing:
      type: object
      additionalProperties: false
      properties:
        propertyId:
          type: string
          minLength: 1
        id:
          type: string
          minLength: 1
        date:
          type: string
          format: date
      required:
      - id
      - propertyId
      - date

    UserViewingList:
      type: object
      additionalProperties: false
      properties:
        viewings:
          type: array
          items:
            $ref: '#/components/schemas/UserViewing'
      required:
      - viewings
