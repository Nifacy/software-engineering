components:
  schemas:
    UserInfo:
      type: object
      additionalProperties: false
      properties:
        id:
          type: string
          minLength: 1
        login:
          type: string
          minLength: 1
        firstName:
          type: string
          minLength: 1
        lastName:
          type: string
          minLength: 1
      required:
      - id
      - login
      - firstName
      - lastName

    UserIds:
      type: object
      additionalProperties: false
      properties:
        userIds:
          type: array
          items:
            type: string
            minLength: 1
      required:
      - userIds
