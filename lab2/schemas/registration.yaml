components:
  schemas:
    RegisterRequestBody:
      type: object
      additionalProperties: false
      properties:
        login:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 1
        firstName:
          type: string
          minLength: 1
        lastName:
          type: string
          minLength: 1
      required:
      - login
      - password
      - firstName
      - lastName

    RegisterResponseBody:
      type: object
      additionalProperties: false
      properties:
        token:
          type: string
      required:
      - token
