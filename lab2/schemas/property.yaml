components:
  schemas:
    CreatePropertyRequestBody:
      type: object
      additionalProperties: false
      properties:
        address:
          $ref: "./common.yaml#/components/schemas/Address"
      required:
      - address

    Property:
      type: object
      additionalProperties: false
      properties:
        id:
          type: string
          minLength: 1
        address:
          $ref: "./common.yaml#/components/schemas/Address"
        ownerId:
          type: string
          minLength: 1
        status:
          type: string
          enum: [ "active", "sold" ]
      required:
      - id
      - address
      - ownerId
      - status
