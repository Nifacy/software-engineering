components:
  schemas:
    CreatePropertyRequestBody:
      type: object
      additionalProperties: false
      properties:
        address:
          $ref: "./common.yaml#/components/schemas/Address"
        price:
          type: integer
          minimum: 1
      required:
      - address
      - price

    Property:
      type: object
      additionalProperties: false
      properties:
        id:
          type: string
          minLength: 1
        address:
          $ref: "./common.yaml#/components/schemas/Address"
        ownerId:
          type: string
          minLength: 1
        status:
          type: string
          enum: [ "active", "sold" ]
        price:
          type: integer
          minimum: 1
      required:
      - id
      - address
      - ownerId
      - status
      - price

    FindPropertiesResponse:
      type: object
      additionalProperties: false
      properties:
        propertyIds:
          type: array
          items:
            type: string
            minLength: 1
      required:
      - propertyIds
