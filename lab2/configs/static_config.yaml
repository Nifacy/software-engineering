components_manager:
    task_processors:

        main-task-processor:
            worker_threads: $worker-threads

        fs-task-processor:
            worker_threads: $worker-fs-threads

    default_task_processor: main-task-processor

    components:
        server:
            listener:
                port: $server-port
                task_processor: main-task-processor

        logging:
            fs-task-processor: fs-task-processor
            loggers:
                default:
                    file_path: '@stderr'
                    level: $logger-level
                    overflow_behavior: discard

        dynamic-config:
            defaults:
                HTTP_CLIENT_CONNECTION_POOL_SIZE: 1000

        testsuite-support: {}

        congestion-control:

        http-client:
        http-client-core:
            load-enabled: $is_testing
            fs-task-processor: fs-task-processor

        dns-client:
            fs-task-processor: fs-task-processor

        tests-control:
            load-enabled: $is-testing
            path: /tests/{action}
            method: POST
            task_processor: main-task-processor

        # Project components

        credentials-storage:
            load-enabled: true

        user-storage:
            load-enabled: true

        auth-checker:
            load-enabled: true

        property-storage:
            load-enabled: true

        viewing-storage:
            load-enabled: true

        # HTTP endpoint handlers

        register-handler:
            path: /register
            method: POST

        login-handler:
            path: /login
            method: POST

        find-users-handler:
            path: /users
            method: GET

        get-user-handler:
            path: /users/{id}
            method: GET

        get-current-user-handler:
            path: /users/me
            method: GET
            auth:
                types:
                - simple-auth

        create-property-handler:
            path: /properties
            method: POST
            auth:
                types:
                - simple-auth

        find-properties-handler:
            path: /properties
            method: GET

        get-property-handler:
            path: /properties/{id}
            method: GET

        schedule-viewing-handler:
            path: /properties/{id}/viewings
            method: POST
            auth:
                types:
                - simple-auth

        delete-viewing-handler:
            path: /properties/{property_id}/viewings/{viewing_id}
            method: DELETE
            auth:
                types:
                - simple-auth

        get-property-viewings-handler:
            path: /properties/{id}/viewings
            method: GET

        get-user-viewings-handler:
            path: /users/me/viewings
            method: GET
            auth:
                types:
                - simple-auth

        update-property-handler:
            path: /properties/{id}
            method: PATCH
            auth:
                types:
                - simple-auth

        get-user-properties-handler:
            path: /users/me/properties
            method: GET
            auth:
                types:
                - simple-auth
